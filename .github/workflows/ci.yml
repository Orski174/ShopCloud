name: ShopCloud CI

on:
  push:
    branches:
      - master
      - main
      - dev
  pull_request:
    branches:
      - master
      - main
      - dev

jobs:
  build-and-test:
    name: Build and Test Services
    runs-on: ubuntu-latest



    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project structure
        run: ls -la

      - name: Build Docker Compose stack
        run: docker compose build

      - name: Start Docker Compose stack
        run: docker compose up -d

      - name: Wait for services to start
        run: sleep 60

      - name: Show running containers
        run: docker compose ps

      - name: Check auth health
        run: curl --fail http://localhost:3001/health

      - name: Check catalog health
        run: curl --fail http://localhost:3002/health

      - name: Check cart health
        run: curl --fail http://localhost:3003/health

      - name: Check checkout health
        run: curl --fail http://localhost:3004/health

      - name: Check admin health
        run: curl --fail http://localhost:3005/health

      - name: Check invoice health
        run: curl --fail http://localhost:3006/health

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop stack
        if: always()
        run: docker compose down

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend
        working-directory: frontend
        run: |
          set -o pipefail
          npm run build 2>&1 | tee frontend-build.log

      - name: Upload frontend build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: frontend/frontend-build.log
          retention-days: 7
