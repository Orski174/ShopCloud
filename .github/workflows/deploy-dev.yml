name: Deploy to Dev

on:
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tags: ${{ steps.image-tags.outputs.tags }}
    strategy:
      matrix:
        service: [auth, catalog, cart, checkout, admin, invoice]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: shopcloud/${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./services/${{ matrix.service }}
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Output image tags
        id: image-tags
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: echo "tags=$ECR_REGISTRY/shopcloud/${{ matrix.service }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, catalog, cart, checkout, admin, invoice]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster shopcloud-dev \
            --service shopcloud-${{ matrix.service }}-dev \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster shopcloud-dev \
            --services shopcloud-${{ matrix.service }}-dev \
            --region ${{ env.AWS_REGION }}

      - name: Verify service health
        run: |
          SERVICE_ENDPOINT=$(aws elbv2 describe-load-balancers \
            --names shopcloud-public-dev \
            --query 'LoadBalancers[0].DNSName' \
            --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          
          # If ALB doesn't exist or was not found, skip health check
          if [ -z "$SERVICE_ENDPOINT" ] || [ "$SERVICE_ENDPOINT" = "None" ]; then
            echo "Warning: Could not find ALB 'shopcloud-public-dev', skipping endpoint health check"
            echo "Service has been deployed and is stabilizing. Monitor ECS console for task status."
            exit 0
          fi
          
          # Service URL depends on service name
          case "${{ matrix.service }}" in
            auth)
              SERVICE_PATH="/auth/health"
              ;;
            catalog)
              SERVICE_PATH="/catalog/health"
              ;;
            cart)
              SERVICE_PATH="/cart/health"
              ;;
            checkout)
              SERVICE_PATH="/checkout/health"
              ;;
            invoice)
              SERVICE_PATH="/invoice/health"
              ;;
            admin)
              echo "Admin service accessed via internal ALB, skipping external health check"
              exit 0
              ;;
          esac
          
          # Try 5 times to check the endpoint (follow redirects)
          for i in {1..5}; do
            response=$(curl -s -L "https://$SERVICE_ENDPOINT$SERVICE_PATH" 2>/dev/null | grep -o "ok\|running" || echo "")
            if [ ! -z "$response" ]; then
              echo "Service ${{ matrix.service }} is healthy"
              exit 0
            fi
            echo "Attempt $i: Service not ready or endpoint unreachable, waiting..."
            sleep 10
          done
          
          echo "Warning: Could not verify service health via endpoint, but ECS reports service is running"
          exit 0

  deploy-webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Deploy to S3
        env:
          S3_BUCKET: shopcloud-frontend-dev-${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          aws s3 sync ./frontend/dist s3://$S3_BUCKET --delete

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"
