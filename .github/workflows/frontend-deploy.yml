name: Deploy Frontend

on:
  push:
    branches:
      - main
      - master
    paths:
      - frontend/**
      - .github/workflows/frontend-deploy.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}
  FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET || secrets.FRONTEND_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID || secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  VITE_AUTH_API_URL: ${{ vars.VITE_AUTH_API_URL || secrets.VITE_AUTH_API_URL }}
  VITE_CATALOG_API_URL: ${{ vars.VITE_CATALOG_API_URL || secrets.VITE_CATALOG_API_URL }}
  VITE_CART_API_URL: ${{ vars.VITE_CART_API_URL || secrets.VITE_CART_API_URL }}
  VITE_CHECKOUT_API_URL: ${{ vars.VITE_CHECKOUT_API_URL || secrets.VITE_CHECKOUT_API_URL }}
  VITE_ADMIN_API_URL: ${{ vars.VITE_ADMIN_API_URL || secrets.VITE_ADMIN_API_URL }}
  VITE_INVOICE_API_URL: ${{ vars.VITE_INVOICE_API_URL || secrets.VITE_INVOICE_API_URL }}

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate deployment configuration
        run: |
          : "${FRONTEND_S3_BUCKET:?FRONTEND_S3_BUCKET is required}"
          : "${CLOUDFRONT_DISTRIBUTION_ID:?CLOUDFRONT_DISTRIBUTION_ID is required}"
          : "${VITE_AUTH_API_URL:?VITE_AUTH_API_URL is required}"
          : "${VITE_CATALOG_API_URL:?VITE_CATALOG_API_URL is required}"
          : "${VITE_CART_API_URL:?VITE_CART_API_URL is required}"
          : "${VITE_CHECKOUT_API_URL:?VITE_CHECKOUT_API_URL is required}"
          : "${VITE_ADMIN_API_URL:?VITE_ADMIN_API_URL is required}"
          : "${VITE_INVOICE_API_URL:?VITE_INVOICE_API_URL is required}"

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || secrets.PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload static assets to S3
        run: |
          aws s3 sync frontend/dist/ "s3://${FRONTEND_S3_BUCKET}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html "s3://${FRONTEND_S3_BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
