services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shopcloud_dev
      POSTGRES_USER: shopcloud
      POSTGRES_PASSWORD: shopcloud_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopcloud -d shopcloud_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb"]
    ports:
      - "8000:8000"

  # Lightweight SQS-compatible queue for local dev
  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf

  # LocalStack for S3 / SES mocking
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,ses
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack

  # DynamoDB table + S3 bucket bootstrap
  aws-bootstrap:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
      - localstack
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 5 &&
        aws dynamodb create-table --table-name shopcloud-carts --attribute-definitions AttributeName=userId,AttributeType=S --key-schema AttributeName=userId,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 || true &&
        aws s3 mb s3://shopcloud-invoices --endpoint-url http://localstack:4566 || true &&
        echo 'AWS bootstrap complete'
    restart: on-failure

  # ─── Database migrations ────────────────────────────────────────────────────
  migrations:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./database:/app
    command: sh -c "npm install && npx sequelize-cli db:migrate && npx sequelize-cli db:seed:all"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shopcloud_dev
      DB_USER: shopcloud
      DB_PASS: shopcloud_secret
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ─── Microservices ───────────────────────────────────────────────────────────
  auth:
    build: ./services/auth
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shopcloud_dev
      DB_USER: shopcloud
      DB_PASS: shopcloud_secret
      JWT_SECRET: dev_jwt_secret_change_in_prod
      JWT_EXPIRES_IN: 7d
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  catalog:
    build: ./services/catalog
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shopcloud_dev
      DB_USER: shopcloud
      DB_PASS: shopcloud_secret
      JWT_SECRET: dev_jwt_secret_change_in_prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cart:
    build: ./services/cart
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      JWT_SECRET: dev_jwt_secret_change_in_prod
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_TABLE: shopcloud-carts
      CART_TTL_SECONDS: 604800
    depends_on:
      - dynamodb-local
    restart: unless-stopped

  checkout:
    build: ./services/checkout
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shopcloud_dev
      DB_USER: shopcloud
      DB_PASS: shopcloud_secret
      JWT_SECRET: dev_jwt_secret_change_in_prod
      CATALOG_SERVICE_URL: http://catalog:3002
      CART_SERVICE_URL: http://cart:3003
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      SQS_ENDPOINT: http://elasticmq:9324
      SQS_INVOICE_QUEUE_URL: http://elasticmq:9324/000000000000/invoice-queue
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build: ./services/admin
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: development
      PORT: 3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shopcloud_dev
      DB_USER: shopcloud
      DB_PASS: shopcloud_secret
      JWT_SECRET: dev_jwt_secret_change_in_prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  invoice:
    build: ./services/invoice
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      SQS_ENDPOINT: http://elasticmq:9324
      SQS_INVOICE_QUEUE_URL: http://elasticmq:9324/000000000000/invoice-queue
      S3_ENDPOINT: http://localstack:4566
      S3_BUCKET: shopcloud-invoices
      SES_FROM_EMAIL: noreply@shopcloud.example.com
    depends_on:
      - elasticmq
      - localstack
    restart: unless-stopped

volumes:
  postgres_data:
  localstack_data:
